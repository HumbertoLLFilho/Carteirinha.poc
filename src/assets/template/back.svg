<svg xmlns="http://www.w3.org/2000/svg" width="1011" height="638" viewBox="0 0 1011 638">
  <defs>
    <clipPath id="cardBack"><rect width="1011" height="638" rx="28"/></clipPath>
  </defs>
  <g clip-path="url(#cardBack)">
    <rect width="1011" height="638" fill="#ffffff"/>

    <!-- Cabeçalho -->
    <rect width="1011" height="135" fill="#0b2c8a"/>
    <g transform="translate(44,40)">
      <path d="M30 0C13 0 0 11 0 25c0 8 5 15 13 19-1 5-3 9-7 13 7-1 13-4 17-7 2 1 5 1 7 1 17 0 30-11 30-25S47 0 30 0z" fill="#ffffff"/>
      <circle cx="30" cy="25" r="8" fill="#0b2c8a"/>
    </g>
    <text x="120" y="88" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#ffffff">Faculdade Exemplo</text>

    <!-- Termos -->
    <g font-family="Arial, Helvetica, sans-serif" fill="#3a4256">
      <text x="60" y="225" font-size="30" font-weight="700" fill="#0b2c8a">Documento de identificação estudantil</text>
      <text x="60" y="290" font-size="26">Pessoal e intransferível. Válido mediante apresentação</text>
      <text x="60" y="330" font-size="26">de documento oficial com foto.</text>
      <text x="60" y="396" font-size="26">Em caso de perda ou roubo, comunique a secretaria.</text>
    </g>

    <!-- Assinatura -->
    <line x1="60" y1="500" x2="500" y2="500" stroke="#9aa1b4" stroke-width="2"/>
    <text x="60" y="535" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#6b7280">Assinatura do(a) estudante</text>

    <!-- Rodapé -->
    <rect x="0" y="566" width="1011" height="72" fill="#f1f3f8"/>
    <text x="60" y="611" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#0b2c8a">www.faculdadeexemplo.edu.br</text>
  </g>
</svg>
